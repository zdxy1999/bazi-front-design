<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单Swiper测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }

    .info {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.9);
      color: #0f0;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      z-index: 9999;
    }

    .swiper-container {
      margin-top: 60px;
      border: 2px solid #60a5fa;
      padding: 20px;
    }

    /* 基础swiper样式 */
    .swiper {
      position: relative;
      width: 100%;
      height: 500px;
      overflow: hidden;
      margin: 20px 0;
      border: 2px dashed #f87171;
    }

    .swiper-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease;
    }

    .swiper-slide {
      flex-shrink: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #86efac;
      background: rgba(134, 239, 172, 0.1);
      font-size: 24px;
      font-weight: bold;
    }

    /* 简单模式样式 */
    .swiper.swiper-simple .swiper-slide {
      position: relative;
    }

    .swiper.swiper-simple .swiper-slide:not(.swiper-slide-active) {
      display: none;
    }

    .swiper.swiper-simple .swiper-slide.swiper-slide-active {
      display: flex;
    }

    /* 按钮样式 */
    .swiper-button-prev,
    .swiper-button-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      z-index: 10;
    }

    .swiper-button-prev {
      left: 10px;
    }

    .swiper-button-next {
      right: 10px;
    }

    .swiper-button-prev:hover,
    .swiper-button-next:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .swiper-pagination {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .swiper-pagination-bullet {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      cursor: pointer;
    }

    .swiper-pagination-bullet-active {
      background: white;
    }
  </style>
</head>
<body>
  <div class="info" id="info">
    <div>Swiper简单模式测试</div>
    <div>当前slide: <span id="currentSlide">0</span></div>
    <div>总slides: <span id="totalSlides">3</span></div>
  </div>

  <div class="swiper-container">
    <h2 style="color: white; margin-bottom: 10px;">Swiper简单模式测试</h2>

    <!-- Swiper容器 - 启用简单模式 -->
    <div class="swiper" data-swiper-simple id="mySwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">Slide 1</div>
        <div class="swiper-slide">Slide 2</div>
        <div class="swiper-slide">Slide 3</div>
      </div>

      <button class="swiper-button-prev">&lt;</button>
      <button class="swiper-button-next">&gt;</button>

      <div class="swiper-pagination"></div>
    </div>
  </div>

  <script src="../../../components/swiper/swiper.js"></script>
  <script>
    // 等待页面加载
    window.addEventListener('load', () => {
      console.log('页面加载完成');

      // 初始化swiper
      initSwipers();

      // 获取swiper实例
      const swiperContainer = document.getElementById('mySwiper');
      const swiper = swiperContainer.swiperInstance;

      if (swiper) {
        console.log('Swiper实例已创建');
        console.log('简单模式:', swiper.simpleMode);
        console.log('Slides数量:', swiper.slides.length);

        // 更新信息显示
        document.getElementById('totalSlides').textContent = swiper.slides.length;
        updateCurrentSlide();

        // 监听slide变化
        const originalUpdate = swiper.updateSlidesClasses.bind(swiper);
        swiper.updateSlidesClasses = function() {
          originalUpdate();
          updateCurrentSlide();
          console.log('当前slide:', this.currentIndex);
        };

        function updateCurrentSlide() {
          document.getElementById('currentSlide').textContent = swiper.currentIndex;
        }
      } else {
        console.error('Swiper实例未创建');
      }
    });

    function initSwipers() {
      const swiperContainers = document.querySelectorAll('.swiper');
      console.log('找到swiper容器:', swiperContainers.length);

      swiperContainers.forEach(container => {
        const simple = container.hasAttribute('data-swiper-simple');
        console.log('简单模式属性:', simple);

        const swiper = new Swiper(container, {
          simple: simple
        });

        container.swiperInstance = swiper;
        console.log('Swiper实例已创建，简单模式:', swiper.simpleMode);
      });
    }
  </script>
</body>
</html>
