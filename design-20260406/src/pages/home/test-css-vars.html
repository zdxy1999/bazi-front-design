<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSSеҸҳйҮҸжөӢиҜ•</title>
  
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    h2 {
      color: white;
      text-align: center;
    }

    .test-box {
      width: 200px;
      height: 100px;
      margin: 20px auto;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    /* жөӢиҜ•1: зӣҙжҺҘеҶҷhslaеҖј */
    .test-1 {
      background: hsla(210, 80%, 60%, 0.3);
      border: 3px solid hsla(210, 80%, 60%, 0.8);
      box-shadow: 0 0 20px hsla(210, 80%, 60%, 0.5);
    }

    /* жөӢиҜ•2: дҪҝз”ЁCSSеҸҳйҮҸпјҢдҪҶз”Ёvar() */
    .test-2 {
      --test-hue: 210;
      --test-sat: 80;
      --test-light: 60;
      background: hsla(var(--test-hue), var(--test-sat)%, var(--test-light)%, 0.3);
      border: 3px solid hsla(var(--test-hue), var(--test-sat)%, var(--test-light)%, 0.8);
      box-shadow: 0 0 20px hsla(var(--test-hue), var(--test-sat)%, var(--test-light)%, 0.5);
    }

    /* жөӢиҜ•3: inline style CSSеҸҳйҮҸ */
    .test-3 {
      background: hsla(var(--theme-hue), var(--theme-saturation)%, var(--theme-lightness)%, 0.3);
      border: 3px solid hsla(var(--theme-hue), var(--theme-saturation)%, var(--theme-lightness)%, 0.8);
      box-shadow: 0 0 20px hsla(var(--theme-hue), var(--theme-saturation)%, var(--theme-lightness)%, 0.5);
    }

    .debug {
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h2>CSSеҸҳйҮҸеә”з”ЁжөӢиҜ•</h2>

  <div class="test-box test-1">
    жөӢиҜ•1: зӣҙжҺҘеҶҷеҖј
  </div>

  <div class="test-box test-2">
    жөӢиҜ•2: еҶ…йғЁеҸҳйҮҸ
  </div>

  <div class="test-box test-3"
       style="--theme-hue: 210; --theme-saturation: 80; --theme-lightness: 60;">
    жөӢиҜ•3: inlineеҸҳйҮҸ
  </div>

  <div class="debug">
    <p><strong>еҰӮжһңжөӢиҜ•1е’Ң2жңүйўңиүІпјҢжөӢиҜ•3жІЎйўңиүІпјҡ</strong><br>
    иҜҙжҳҺinline styleзҡ„CSSеҸҳйҮҸжңүй—®йўҳ</p>
    
    <p><strong>еҰӮжһңжөӢиҜ•1гҖҒ2гҖҒ3йғҪжІЎйўңиүІпјҡ</strong><br>
    иҜҙжҳҺhsla()еҮҪж•°жң¬иә«жңүй—®йўҳ</p>
  </div>

  <script>
    console.log('вң… CSSеҸҳйҮҸжөӢиҜ•йЎөйқўеҠ иҪҪе®ҢжҲҗ');
    
    const tests = [
      { name: 'жөӢиҜ•1', hasInline: false },
      { name: 'жөӢиҜ•2', hasInline: false },
      { name: 'жөӢиҜ•3', hasInline: true }
    ];
    
    tests.forEach(test => {
      console.log(`\n${test.name}:`);
      if (test.hasInline) {
        const el = document.querySelector('.test-3');
        const inlineStyle = el.getAttribute('style');
        console.log('  inline style:', inlineStyle);
        
        // е°қиҜ•иҜ»еҸ–CSSеҸҳйҮҸ
        const computedStyle = window.getComputedStyle(el);
        const hue = computedStyle.getPropertyValue('--theme-hue');
        const sat = computedStyle.getPropertyValue('--theme-saturation');
        const light = computedStyle.getPropertyValue('--theme-lightness');
        console.log('  CSSеҸҳйҮҸеҖј:', { hue, sat, light });
      }
    });
  </script>
</body>
</html>
