<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS变量修复测试</title>
  
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    h2 {
      color: white;
      text-align: center;
    }

    .test-box {
      width: 200px;
      height: 100px;
      margin: 20px auto;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    /* 原来的方式（不工作） */
    .test-old {
      --h: 210;
      --s: 80;
      --l: 60;
      background: hsla(var(--h), var(--s)%, var(--l)%, 0.3);
      border: 3px solid hsla(var(--h), var(--s)%, var(--l)%, 0.8);
    }

    /* 修复方式1: 用rgb()代替hsla() */
    .test-fix1 {
      --h: 210;
      --s: 80%;
      --l: 60%;
      background: hsl(var(--h), var(--s), var(--l));
      border: 3px solid hsl(var(--h), var(--s), var(--l));
    }

    /* 修复方式2: 直接用变量名（带%） */
    .test-fix2 {
      --hue: 210;
      --saturation: 80%;
      --lightness: 60%;
      background: hsla(var(--hue), var(--saturation), var(--lightness), 0.3);
      border: 3px solid hsla(var(--hue), var(--saturation), var(--lightness), 0.8);
    }

    .debug {
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h2>CSS变量修复测试</h2>

  <div class="test-box test-old">
    旧方式: 不工作
  </div>

  <div class="test-box test-fix1">
    修复1: 带%的变量
  </div>

  <div class="test-box test-fix2">
    修复2: hsl()代替hsla()
  </div>

  <div class="debug">
    <p><strong>如果修复1和2有颜色，说明需要改变CSS变量的定义方式</strong></p>
    <p>需要把saturation和lightness的值改成带%的字符串</p>
  </div>

  <script>
    console.log('✅ CSS变量修复测试页面加载完成');
  </script>
</body>
</html>
