<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片颜色测试</title>
  <link rel="stylesheet" href="../../../style/tokens.css">
  <link rel="stylesheet" href="../../../style/common.css">
  <link rel="stylesheet" href="../../../components/card/card.css">
  <style>
    body {
      padding: 50px;
      background: #1a1a1a;
    }
    .test-card {
      width: 300px;
      height: 200px;
      margin: 20px;
      padding: 20px;
      position: relative;
    }
    .green-card {
      --theme-hue: 120;
      --theme-saturation: 70%;
      --theme-lightness: 50%;
    }
    .blue-card {
      --theme-hue: 200;
      --theme-saturation: 75%;
      --theme-lightness: 55%;
    }
    .red-card {
      --theme-hue: 0;
      --theme-saturation: 80%;
      --theme-lightness: 60%;
    }
    /* 强制给glass-card添加可见背景 */
    .glass-card {
      border: 5px solid orange !important;
    }
    .glass-card.green-card {
      border-color: #00ff00 !important;
    }
    .glass-card.blue-card {
      border-color: #0000ff !important;
    }
    .glass-card.red-card {
      border-color: #ff0000 !important;
    }
  </style>
</head>
<body>
  <h1 style="color: white;">卡片颜色测试</h1>

  <div class="glass-card test-card green-card static-glow" data-card>
    <div class="card-edge-glow"></div>
    <div class="card-glow"></div>
    <div class="glass-card-content">
      <h3 style="color: white;">绿色卡片（木）</h3>
      <p style="color: #ccc;">应该显示绿色边缘</p>
    </div>
  </div>

  <div class="glass-card test-card blue-card static-glow" data-card>
    <div class="card-edge-glow"></div>
    <div class="card-glow"></div>
    <div class="glass-card-content">
      <h3 style="color: white;">蓝色卡片（水）</h3>
      <p style="color: #ccc;">应该显示蓝色边缘</p>
    </div>
  </div>

  <div class="glass-card test-card red-card static-glow" data-card>
    <div class="card-edge-glow"></div>
    <div class="card-glow"></div>
    <div class="glass-card-content">
      <h3 style="color: white;">红色卡片（火）</h3>
      <p style="color: #ccc;">应该显示红色边缘</p>
    </div>
  </div>

  <script src="../../../components/card/card.js"></script>
  <script>
    setTimeout(() => {
      console.log('===== 测试页面调试 =====');
      console.log('window.CardComponent:', !!window.CardComponent);

      const cards = document.querySelectorAll('[data-card]');
      console.log('找到卡片数量:', cards.length);

      cards.forEach((card, index) => {
        console.log(`\n--- 卡片${index} ---`);
        console.log('类名:', card.className);
        console.log('有static-glow类:', card.classList.contains('static-glow'));

        // 检查CSS变量
        const style = card.style;
        console.log('内联CSS变量:', {
          hue: style.getPropertyValue('--theme-hue'),
          sat: style.getPropertyValue('--theme-saturation'),
          light: style.getPropertyValue('--theme-lightness')
        });

        // 检查.card-glow元素
        const cardGlow = card.querySelector('.card-glow');
        console.log('有.card-glow元素:', !!cardGlow);

        if (cardGlow) {
          const glowStyle = window.getComputedStyle(cardGlow);
          console.log('.card-glow样式:', {
            position: glowStyle.position,
            zIndex: glowStyle.zIndex,
            opacity: glowStyle.opacity,
            background: glowStyle.background.substring(0, 100) + '...',
            border: glowStyle.border,
            width: glowStyle.width,
            height: glowStyle.height,
            top: glowStyle.top,
            left: glowStyle.left
          });

          // 检查--pointer-d
          const pointerD = card.style.getPropertyValue('--pointer-d');
          console.log('--pointer-d:', pointerD);

          // 直接设置一个明显的背景色测试
          cardGlow.style.background = 'red';
          cardGlow.style.border = '5px solid yellow';
          console.log('✅ 已直接设置card-glow为红色背景+黄色边框');
        }
      });

      console.log('\n===== 调试完成 =====');
    }, 1000);
  </script>
</body>
</html>
