<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>完整调试</title>
  <link rel="stylesheet" href="../../../style/tokens.css">
  <link rel="stylesheet" href="../../../style/common.css">
  <link rel="stylesheet" href="../../../components/background/background.css">
  <link rel="stylesheet" href="../../../components/card/card.css">
  <link rel="stylesheet" href="../../../components/button/button.css">
  <link rel="stylesheet" href="home.css">
  <style>
    .debug-panel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.95);
      color: #0f0;
      padding: 15px;
      font-family: monospace;
      font-size: 12px;
      z-index: 9999;
      max-height: 400px;
      overflow-y: auto;
    }
    .debug-section {
      margin: 10px 0;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    .debug-item {
      margin: 5px 0;
      font-size: 11px;
    }
    .error { color: #ef4444; }
    .success { color: #22c55e; }
    .warning { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="debug-panel" id="debugPanel"></div>

  <div class="background-container">
    <svg class="svg-background" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="Gradient1" cx="50%" cy="50%" r=".5">
          <stop offset="0%" stop-color="#86efac" stop-opacity="0.15"></stop>
          <stop offset="100%" stop-color="#86efac" stop-opacity="0"></stop>
        </radialGradient>
      </defs>
      <rect x="13.744%" y="1.18473%" width="100%" height="100%" fill="url(#Gradient1)"></rect>
    </svg>
    <div class="glass-overlay"></div>
  </div>

  <main class="home-container" style="margin-top: 350px;">
    <h2 style="color: white; text-align: center; margin-bottom: 20px;">卡片颜色和图标调试</h2>

    <!-- 测试不同命卦的卡片 -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px;">
      <!-- 一白坎卦 - 白色 -->
      <div class="glass-card" data-card data-star="1" style="--theme-hue: 0; --theme-saturation: 0; --theme-lightness: 70;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <div class="glass-card-logo glass-card-logo-center">
            <img src="../../../components/icons/mingua/kan.svg" alt="坎" class="mingua-icon" style="width: 48px; height: 48px;">
          </div>
          <div class="glass-card-body">
            <h3 class="profile-name">一白坎卦</h3>
            <p class="profile-birth">HSL: 0, 0%, 70% (白色)</p>
          </div>
        </div>
      </div>

      <!-- 三碧震卦 - 蓝绿色 -->
      <div class="glass-card" data-card data-star="3" style="--theme-hue: 200; --theme-saturation: 75; --theme-lightness: 55;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <div class="glass-card-logo glass-card-logo-center">
            <img src="../../../components/icons/mingua/zhen.svg" alt="震" class="mingua-icon" style="width: 48px; height: 48px;">
          </div>
          <div class="glass-card-body">
            <h3 class="profile-name">三碧震卦</h3>
            <p class="profile-birth">HSL: 200, 75%, 55% (蓝绿色)</p>
          </div>
        </div>
      </div>

      <!-- 四绿巽卦 - 绿色 -->
      <div class="glass-card" data-card data-star="4" style="--theme-hue: 120; --theme-saturation: 70; --theme-lightness: 50;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <div class="glass-card-logo glass-card-logo-center">
            <img src="../../../components/icons/mingua/xun.svg" alt="巽" class="mingua-icon" style="width: 48px; height: 48px;">
          </div>
          <div class="glass-card-body">
            <h3 class="profile-name">四绿巽卦</h3>
            <p class="profile-birth">HSL: 120, 70%, 50% (绿色)</p>
          </div>
        </div>
      </div>

      <!-- 九紫离卦 - 紫色 -->
      <div class="glass-card" data-card data-star="9" style="--theme-hue: 275; --theme-saturation: 80; --theme-lightness: 60;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <div class="glass-card-logo glass-card-logo-center">
            <img src="../../../components/icons/mingua/li.svg" alt="离" class="mingua-icon" style="width: 48px; height: 48px;">
          </div>
          <div class="glass-card-body">
            <h3 class="profile-name">九紫离卦</h3>
            <p class="profile-birth">HSL: 275, 80%, 60% (紫色)</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../../../components/background/background.js"></script>
  <script src="../../../components/card/card.js"></script>
  <script src="../../../components/button/button.js"></script>
  <script>
    const debugPanel = document.getElementById('debugPanel');

    function addSection(title) {
      const section = document.createElement('div');
      section.className = 'debug-section';
      section.innerHTML = `<strong>${title}</strong>`;
      debugPanel.appendChild(section);
      return section;
    }

    function addItem(section, text, type = '') {
      const item = document.createElement('div');
      item.className = `debug-item ${type}`;
      item.textContent = text;
      section.appendChild(item);
    }

    // 检查卡片组件
    const section = addSection('CardComponent检查');
    if (window.cardComponent) {
      addItem(section, `✅ CardComponent已创建`, 'success');
      addItem(section, `卡片数量: ${window.cardComponent.cards.length}`, 'success');
      window.cardComponent.cards.forEach((card, index) => {
        const styles = window.getComputedStyle(card);
        const hue = styles.getPropertyValue('--theme-hue');
        const sat = styles.getPropertyValue('--theme-saturation');
        const light = styles.getPropertyValue('--theme-lightness');
        addItem(section, `卡片${index + 1}: HSL(${hue}, ${sat}, ${light})`);
      });
    } else {
      addItem(section, `❌ CardComponent未创建`, 'error');
    }

    // 检查图标
    const iconSection = addSection('图标检查');
    const icons = document.querySelectorAll('.mingua-icon');
    addItem(iconSection, `找到${icons.length}个图标`, icons.length > 0 ? 'success' : 'error');
    icons.forEach((img, index) => {
      const section = addSection(`图标${index + 1}: ${img.alt}`);
      addItem(section, `src: ${img.src}`);
      addItem(section, `完整路径: ${img.complete ? '已加载' : '未加载'}`, img.complete ? 'success' : 'warning');
      addItem(section, `naturalWidth: ${img.naturalWidth} x ${img.naturalHeight}`, img.naturalWidth > 0 ? 'success' : 'error');
      if (!img.complete || img.naturalWidth === 0) {
        img.onerror = () => addItem(section, '❌ 图标加载失败', 'error');
        img.onload = () => addItem(section, '✅ 图标加载成功', 'success');
      }
    });

    // 检查CSS变量
    const cssSection = addSection('CSS变量检查');
    const cards = document.querySelectorAll('[data-card]');
    cards.forEach((card, index) => {
      const star = card.getAttribute('data-star');
      const styles = window.getComputedStyle(card);
      const hue = styles.getPropertyValue('--theme-hue');
      const sat = styles.getPropertyValue('--theme-saturation');
      const light = styles.getPropertyValue('--theme-lightness');
      addItem(cssSection, `卡片${index + 1} (star=${star}): HSL(${hue}, ${sat}, ${light})`);

      // 检查是否有边缘发光
      const beforeStyles = window.getComputedStyle(card, '::before');
      const afterStyles = window.getComputedStyle(card, '::after');
      addItem(cssSection, `::before背景: ${beforeStyles.background.substring(0, 50)}...`);
      addItem(cssSection, `::after背景: ${afterStyles.background.substring(0, 50)}...`);
    });

    addItem(section, '✅ 调试脚本完成', 'success');
  </script>
</body>
</html>
