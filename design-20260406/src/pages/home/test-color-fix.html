<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>颜色修复测试</title>
  <link rel="stylesheet" href="../../../components/card/card.css">
  <style>
    body {
      min-height: 100vh;
      padding: 40px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: system-ui, -apple-system, sans-serif;
      color: white;
    }

    .test-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .test-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }

    .result-panel {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 20px;
      font-family: monospace;
      font-size: 12px;
      color: #0f0;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }

    .test-card {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1 class="test-title">颜色修复测试 - 验证HSLA语法</h1>

    <!-- 测试不同命卦颜色的卡片 -->
    <div class="test-grid">
      <!-- 乾卦 (金) -->
      <div class="glass-card fire-card static-glow test-card" id="card1"
           style="--theme-hue: 0; --theme-saturation: 70; --theme-lightness: 55;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <h3>乾卦 - 金 (白色)</h3>
          <p>应该显示红色边缘光晕</p>
        </div>
      </div>

      <!-- 坤卦 (土) -->
      <div class="glass-card earth-card static-glow test-card" id="card2"
           style="--theme-hue: 45; --theme-saturation: 90; --theme-lightness: 50;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <h3>坤卦 - 土 (黄色)</h3>
          <p>应该显示黄色边缘光晕</p>
        </div>
      </div>

      <!-- 震卦 (木) -->
      <div class="glass-card wood-card static-glow test-card" id="card3"
           style="--theme-hue: 120; --theme-saturation: 60; --theme-lightness: 40;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <h3>震卦 - 木 (绿色)</h3>
          <p>应该显示绿色边缘光晕</p>
        </div>
      </div>
    </div>

    <div class="result-panel" id="result">
      等待检查...
    </div>
  </div>

  <script>
    setTimeout(() => {
      const result = document.getElementById('result');
      const cards = document.querySelectorAll('.test-card');

      let output = '=== 颜色修复测试结果 ===\n\n';

      cards.forEach((card, index) => {
        const cardId = card.id;
        const computedStyle = window.getComputedStyle(card);

        // 读取CSS变量
        const hue = computedStyle.getPropertyValue('--theme-hue').trim();
        const sat = computedStyle.getPropertyValue('--theme-saturation').trim();
        const light = computedStyle.getPropertyValue('--theme-lightness').trim();

        output += `卡片 ${index + 1} (${cardId}):\n`;
        output += `  CSS变量: hue=${hue}, sat=${sat}, light=${light}\n`;

        // 检查::before伪元素（背景色）
        const beforeStyle = window.getComputedStyle(card, '::before');
        const beforeBg = beforeStyle.backgroundColor;
        output += `  ::before背景色: ${beforeBg}\n`;

        // 检查::after伪元素（渐变层）
        const afterStyle = window.getComputedStyle(card, '::after');
        const afterBg = afterStyle.backgroundImage;
        output += `  ::after渐变: ${afterBg.substring(0, 100)}...\n`;

        // 检查.card-edge-glow
        const edgeGlow = card.querySelector('.card-edge-glow');
        if (edgeGlow) {
          const edgeGlowStyle = window.getComputedStyle(edgeGlow);
          const edgeGlowBg = edgeGlowStyle.backgroundImage;
          output += `  .card-edge-glow: ${edgeGlowBg.substring(0, 80)}...\n`;
        }

        // 检查.card-glow
        const cardGlow = card.querySelector('.card-glow');
        if (cardGlow) {
          const cardGlowStyle = window.getComputedStyle(cardGlow);
          const glowOpacity = cardGlowStyle.opacity;
          const glowBg = cardGlowStyle.background;
          const glowBorder = cardGlowStyle.border;
          output += `  .card-glow opacity: ${glowOpacity}\n`;
          output += `  .card-glow背景: ${glowBg.substring(0, 80)}...\n`;
          output += `  .card-glow边框: ${glowBorder}\n`;
        }

        // 判断是否有颜色
        const hasColor = beforeBg !== 'rgba(0, 0, 0, 0)';
        output += `  状态: ${hasColor ? '✅ 有颜色' : '❌ 无颜色（透明）'}\n`;
        output += '\n';
      });

      output += '=== 测试总结 ===\n';
      output += '如果所有卡片都显示"✅ 有颜色"，说明修复成功！\n';
      output += '如果显示"❌ 无颜色"，请检查浏览器控制台的CSS错误。';

      result.textContent = output;
    }, 200);
  </script>
</body>
</html>
