<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS加载测试</title>
  <link rel="stylesheet" href="../../../style/tokens.css">
  <link rel="stylesheet" href="../../../style/common.css">
  <link rel="stylesheet" href="../../../components/background/background.css">
  <link rel="stylesheet" href="../../../components/card/card.css">
  <link rel="stylesheet" href="../../../components/swiper/swiper.css">
  <link rel="stylesheet" href="../../../components/menu/menu.css">
  <link rel="stylesheet" href="../../../components/button/button.css">
  <link rel="stylesheet" href="../../../components/selector/selector.css">
  <link rel="stylesheet" href="../../../components/wuxing-chart/wuxing-chart.css">
  <link rel="stylesheet" href="home.css">

  <style>
    .test-result {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.95);
      color: #0f0;
      padding: 20px;
      font-family: monospace;
      font-size: 14px;
      z-index: 9999;
    }
    .test-item {
      margin: 10px 0;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    .success { border-left: 4px solid #22c55e; }
    .error { border-left: 4px solid #ef4444; }
  </style>
</head>
<body>
  <div class="test-result">
    <h2>CSS加载测试</h2>
    <div id="results"></div>
  </div>

  <div class="background-container">
    <svg class="svg-background" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="Gradient1" cx="50%" cy="50%" r=".5">
          <stop offset="0%" stop-color="#86efac" stop-opacity="0.15"></stop>
          <stop offset="100%" stop-color="#86efac" stop-opacity="0"></stop>
        </radialGradient>
      </defs>
      <rect x="13.744%" y="1.18473%" width="100%" height="100%" fill="url(#Gradient1)"></rect>
    </svg>
    <div class="edge-glow">
      <div class="edge-glow-left"></div>
      <div class="edge-glow-right"></div>
    </div>
    <div class="glass-overlay"></div>
  </div>

  <main class="home-container" style="margin-top: 200px;">
    <!-- 测试五行图容器 -->
    <div class="profile-content">
      <div class="wuxing-chart-container">
        <div style="color: white; text-align: center; padding: 50px;">
          五行图容器<br>
          应该看到绿色虚线边框<br>
          (如果是600px宽)
        </div>
      </div>

      <!-- 测试卡片 -->
      <div class="glass-card summary-card" data-card data-star="1" style="--theme-hue: 0; --theme-saturation: 0%; --theme-lightness: 70%;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <div class="glass-card-body">
            <h3 class="profile-name">测试卡片</h3>
            <div class="glass-card-footer">
              <label class="toggle-switch" style="--toggle-color: hsla(0, 0%, 70%, 0.8);">
                <input type="checkbox" id="testToggle">
                <span class="toggle-slider"></span>
                <span class="toggle-label">开关颜色应该跟随主题</span>
              </label>
              <button class="btn btn-danger btn-sm" data-action="delete">
                删除按钮（红色）
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../../../components/background/background.js"></script>
  <script src="../../../components/card/card.js"></script>
  <script src="../../../components/swiper/swiper.js"></script>
  <script src="../../../components/menu/menu.js"></script>
  <script src="../../../components/button/button.js"></script>
  <script src="../../../components/selector/selector.js"></script>
  <script src="../../../components/wuxing-chart/wuxing-chart.js"></script>
  <script src="home.js"></script>

  <script>
    const results = document.getElementById('results');

    function addTest(name, passed, details) {
      const div = document.createElement('div');
      div.className = `test-item ${passed ? 'success' : 'error'}`;
      div.innerHTML = `
        <strong>${passed ? '✅' : '❌'} ${name}</strong><br>
        ${details}
      `;
      results.appendChild(div);
    }

    // 测试五行图容器尺寸
    const chartContainer = document.querySelector('.wuxing-chart-container');
    if (chartContainer) {
      const rect = chartContainer.getBoundingClientRect();
      const hasBorder = chartContainer.style.border && chartContainer.style.border.includes('dashed');
      addTest(
        '五行图容器',
        rect.width >= 400 && hasBorder,
        `宽度: ${Math.round(rect.width)}px, 有虚线边框: ${hasBorder}`
      );
    } else {
      addTest('五行图容器', false, '未找到元素');
    }

    // 测试按钮样式
    const deleteBtn = document.querySelector('.btn.btn-danger');
    if (deleteBtn) {
      const isBtn = deleteBtn.classList.contains('btn');
      const isDanger = deleteBtn.classList.contains('btn-danger');
      const isSm = deleteBtn.classList.contains('btn-sm');
      addTest(
        '删除按钮',
        isBtn && isDanger && isSm,
        `btn: ${isBtn}, btn-danger: ${isDanger}, btn-sm: ${isSm}`
      );
    } else {
      addTest('删除按钮', false, '未找到按钮');
    }

    // 测试开关颜色变量
    const toggle = document.querySelector('.toggle-switch');
    if (toggle) {
      const hasColorVar = toggle.style.getPropertyValue('--toggle-color') !== '';
      addTest(
        '开关颜色变量',
        hasColorVar,
        `--toggle-color: ${toggle.style.getPropertyValue('--toggle-color') || '未设置'}`
      );
    } else {
      addTest('开关', false, '未找到开关');
    }

    // 测试home.css是否加载
    const homeStyle = document.styleSheets[8]; // home.css应该是第9个样式表
    if (homeStyle) {
      try {
        const rules = homeStyle.cssRules || homeStyle.rules;
        let foundWuxing = false;
        let foundButton = false;
        for (let i = 0; i < rules.length; i++) {
          const cssText = rules[i].cssText || '';
          if (cssText.includes('.wuxing-chart-container')) foundWuxing = true;
          if (cssText.includes('max-width: 600px')) foundButton = true;
        }
        addTest(
          'home.css加载',
          foundWuxing && foundButton,
          `五行图规则: ${foundWuxing}, 600px规则: ${foundButton}`
        );
      } catch (e) {
        addTest('home.css加载', false, `无法读取规则: ${e.message}`);
      }
    } else {
      addTest('home.css加载', false, '未找到home.css样式表');
    }

    console.log('CSS测试完成');
  </script>
</body>
</html>
