<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>调试测试</title>
</head>
<body>
  <h1>Card.js 加载测试</h1>
  <div id="output"></div>

  <!-- 测试1: 直接引用完整路径 -->
  <h2>测试1: 相对路径</h2>
  <div id="test1"></div>
  <script>
    function log(id, msg) {
      const div = document.createElement('div');
      div.textContent = msg;
      document.getElementById(id).appendChild(div);
      console.log(msg);
    }

    log('test1', '开始加载card.js (相对路径)...');
  </script>
  <script src="../../../components/card/card.js"></script>
  <script>
    setTimeout(() => {
      log('test1', 'window.cardComponent: ' + !!window.cardComponent);
      log('test1', 'window.CardComponent: ' + !!window.CardComponent);
      log('test1', 'typeof window.CardComponent: ' + typeof window.CardComponent);
    }, 500);
  </script>

  <!-- 测试2: 检查文件是否存在 -->
  <h2>测试2: 文件路径检查</h2>
  <div id="test2"></div>
  <script>
    fetch('../../../components/card/card.js')
      .then(response => {
        log('test2', 'Fetch状态: ' + response.status);
        return response.text();
      })
      .then(text => {
        log('test2', '文件大小: ' + text.length + ' 字节');
        log('test2', '前100字符: ' + text.substring(0, 100));
      })
      .catch(error => {
        log('test2', '加载失败: ' + error);
      });
  </script>

  <!-- 测试3: 创建一个测试卡片 -->
  <h2>测试3: 测试卡片</h2>
  <div class="glass-card" data-card
       style="--theme-hue: 120; --theme-saturation: 60%; --theme-lightness: 40%; width: 300px; height: 200px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">
    测试卡片
  </div>
  <div id="test3"></div>
  <script>
    setTimeout(() => {
      const testCard = document.querySelector('[data-card]');
      log('test3', '测试卡片元素: ' + !!testCard);

      if (testCard) {
        const style = window.getComputedStyle(testCard);
        log('test3', '--theme-hue: ' + style.getPropertyValue('--theme-hue'));
        log('test3', '--theme-saturation: ' + style.getPropertyValue('--theme-saturation'));
        log('test3', '--theme-lightness: ' + style.getPropertyValue('--theme-lightness'));
      }

      if (window.CardComponent) {
        log('test3', '尝试创建新实例...');
        try {
          const newComponent = new window.CardComponent();
          log('test3', '新实例创建成功! 卡片数量: ' + newComponent.cards.length);
        } catch (error) {
          log('test3', '创建失败: ' + error.message);
        }
      }
    }, 1000);
  </script>
</body>
</html>
