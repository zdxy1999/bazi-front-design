<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>测试inline style</title>
  <link rel="stylesheet" href="../../../style/tokens.css">
  <link rel="stylesheet" href="../../../components/card/card.css">
  <style>
    body {
      padding: 40px;
      background: #1a1a2e;
      color: white;
    }
  </style>
</head>
<body>
  <h1>测试inline style</h1>

  <!-- 测试1: 直接在HTML中写死CSS变量 -->
  <div class="glass-card static-glow" data-card
       style="--theme-hue: 0; --theme-saturation: 70; --theme-lightness: 55; width: 300px; margin: 20px 0;">
    <div class="card-edge-glow"></div>
    <div class="card-glow"></div>
    <div class="glass-card-content">
      <h3>测试1 - 红色卡片</h3>
    </div>
  </div>

  <!-- 测试2: 另一种格式 -->
  <div class="glass-card static-glow" data-card
       style="--theme-hue:120; --theme-saturation:70; --theme-lightness:50; width: 300px; margin: 20px 0;">
    <div class="card-edge-glow"></div>
    <div class="card-glow"></div>
    <div class="glass-card-content">
      <h3>测试2 - 绿色卡片</h3>
    </div>
  </div>

  <script>
    setTimeout(() => {
      const cards = document.querySelectorAll('[data-card]');
      cards.forEach((card, index) => {
        const computedStyle = window.getComputedStyle(card);
        const beforeStyle = window.getComputedStyle(card, '::before');
        const inlineStyle = card.getAttribute('style');
        
        console.log(`卡片 ${index + 1}:`);
        console.log(`  inline style: ${inlineStyle}`);
        console.log(`  ::before背景色: ${beforeStyle.backgroundColor}`);
        console.log(`  状态: ${beforeStyle.backgroundColor !== 'rgba(0, 0, 0, 0)' ? '✅ 有颜色' : '❌ 无颜色'}`);
      });
    }, 100);
  </script>
</body>
</html>
