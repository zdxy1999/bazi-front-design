<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>静态光晕测试</title>

  <link rel="stylesheet" href="../../../style/tokens.css">
  <link rel="stylesheet" href="../../../style/common.css">
  <link rel="stylesheet" href="../../../components/card/card.css">

  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
      background: #1a1a2e;
    }

    .test-row {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .test-label {
      color: white;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1 style="color: white;">静态光晕效果测试</h1>

  <div class="test-row">
    <!-- 没有static-glow类的卡片 -->
    <div>
      <div class="glass-card"
           data-card
           style="--theme-hue: 210; --theme-saturation: 90; --theme-lightness: 60; width: 300px;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <div class="glass-card-header">
            <h3 class="glass-card-title">没有static-glow类</h3>
            <p class="glass-card-subtitle">水命 - 蓝色</p>
          </div>
          <div class="glass-card-body">
            <p class="glass-card-text">应该没有明显颜色</p>
          </div>
        </div>
      </div>
      <div class="test-label">默认状态（无类）</div>
    </div>

    <!-- 有static-glow类的卡片 -->
    <div>
      <div class="glass-card static-glow"
           data-card
           style="--theme-hue: 210; --theme-saturation: 90; --theme-lightness: 60; width: 300px;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <div class="glass-card-header">
            <h3 class="glass-card-title">有static-glow类</h3>
            <p class="glass-card-subtitle">水命 - 蓝色</p>
          </div>
          <div class="glass-card-body">
            <p class="glass-card-text">应该有明显的蓝色</p>
          </div>
        </div>
      </div>
      <div class="test-label">PC端静态光晕</div>
    </div>
  </div>

  <div class="test-row">
    <!-- 红色卡片 -->
    <div>
      <div class="glass-card static-glow"
           data-card
           style="--theme-hue: 0; --theme-saturation: 70; --theme-lightness: 55; width: 300px;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <div class="glass-card-header">
            <h3 class="glass-card-title">火命</h3>
            <p class="glass-card-subtitle">九紫离卦</p>
          </div>
          <div class="glass-card-body">
            <p class="glass-card-text">应该有明显的红色</p>
          </div>
        </div>
      </div>
      <div class="test-label">火命 - 红色</div>
    </div>

    <!-- 绿色卡片 -->
    <div>
      <div class="glass-card static-glow"
           data-card
           style="--theme-hue: 120; --theme-saturation: 60; --theme-lightness: 40; width: 300px;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <div class="glass-card-header">
            <h3 class="glass-card-title">木命</h3>
            <p class="glass-card-subtitle">三碧震卦</p>
          </div>
          <div class="glass-card-body">
            <p class="glass-card-text">应该有明显的绿色</p>
          </div>
        </div>
      </div>
      <div class="test-label">木命 - 绿色</div>
    </div>

    <!-- 黄色卡片 -->
    <div>
      <div class="glass-card static-glow"
           data-card
           style="--theme-hue: 45; --theme-saturation: 90; --theme-lightness: 50; width: 300px;">
        <div class="card-edge-glow"></div>
        <div class="card-glow"></div>
        <div class="glass-card-content">
          <div class="glass-card-header">
            <h3 class="glass-card-title">土命</h3>
            <p class="glass-card-subtitle">五黄中宫</p>
          </div>
          <div class="glass-card-body">
            <p class="glass-card-text">应该有明显的黄色</p>
          </div>
        </div>
      </div>
      <div class="test-label">土命 - 黄色</div>
    </div>
  </div>

  <script>
    // 检查伪元素样式
    setTimeout(() => {
      const cards = document.querySelectorAll('[data-card]');
      console.log('=== 检查伪元素样式 ===');

      cards.forEach((card, index) => {
        const computedStyle = window.getComputedStyle(card);
        const beforeStyle = window.getComputedStyle(card, '::before');
        const afterStyle = window.getComputedStyle(card, '::after');

        console.log(`\n卡片${index + 1}:`, {
          classes: card.className,
          hue: computedStyle.getPropertyValue('--theme-hue'),
          beforeBg: beforeStyle.backgroundColor,
          afterBg: afterStyle.background.substring(0, 100)
        });
      });
    }, 100);
  </script>
</body>
</html>
