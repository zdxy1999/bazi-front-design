<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>简单HSLA测试</title>
  <style>
    body {
      padding: 40px;
      background: #1a1a2e;
      font-family: monospace;
      color: white;
    }

    .test-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .test-card {
      position: relative;
      width: 150px;
      height: 150px;
      border-radius: 12px;
      padding: 20px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .result {
      background: rgba(0, 0, 0, 0.5);
      padding: 20px;
      border-radius: 8px;
      font-size: 12px;
      color: #0f0;
      white-space: pre-wrap;
    }

    /* 测试1: 直接写hsla值 */
    .test1 {
      background: hsla(210, 90%, 60%, 0.15);
    }

    /* 测试2: 使用CSS变量（无%） */
    .test2 {
      --hue: 210;
      --sat: 90;
      --light: 60;
      background: hsla(var(--hue), var(--sat)%, var(--light)%, 0.15);
    }

    /* 测试3: 使用CSS变量（带%） */
    .test3 {
      --hue: 210;
      --sat: 90%;
      --light: 60%;
      background: hsla(var(--hue), var(--sat), var(--light), 0.15);
    }

    /* 测试4: 使用CSS变量（带%）+ ::before */
    .test4 {
      --hue: 210;
      --sat: 90%;
      --light: 60%;
      background: white;
    }
    .test4::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: hsla(var(--hue), var(--sat), var(--light), 0.15);
    }

    /* 测试5: 使用CSS变量（带%）+ ::before + inline style */
    .test5 {
      background: white;
    }
  </style>
</head>
<body>
  <h1>HSLA + CSS变量测试</h1>

  <div class="test-container">
    <div class="test-card test1">
      测试1<br>直接hsla<br>hsla(210, 90%, 60%, 0.15)
    </div>
    <div class="test-card test2">
      测试2<br>变量无%<br>hsla(var(--hue), var(--sat)%, var(--light)%, 0.15)
    </div>
    <div class="test-card test3">
      测试3<br>变量带%<br>hsla(var(--hue), var(--sat), var(--light), 0.15)
    </div>
  </div>

  <div class="test-container">
    <div class="test-card test4">
      测试4<br>::before<br>变量带%
    </div>
    <div class="test-card test5" style="--hue: 210; --sat: 90%; --light: 60%;">
      测试5<br>inline style
    </div>
  </div>

  <div class="result" id="result">
    等待检查...
  </div>

  <script>
    setTimeout(() => {
      const result = document.getElementById('result');
      const tests = document.querySelectorAll('.test-card');

      let output = '=== 检查背景色 ===\n';

      tests.forEach((card, index) => {
        const computedStyle = window.getComputedStyle(card);
        const bgColor = computedStyle.backgroundColor;
        output += `测试${index + 1}: ${bgColor}\n`;

        // 检查::before（如果存在）
        const beforeStyle = window.getComputedStyle(card, '::before');
        const beforeBg = beforeStyle.backgroundColor;
        if (beforeBg !== 'rgba(0, 0, 0, 0)') {
          output += `  ::before: ${beforeBg}\n`;
        }
      });

      result.textContent = output;
    }, 100);
  </script>
</body>
</html>
