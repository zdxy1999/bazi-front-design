<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>调试颜色问题</title>
  <link rel="stylesheet" href="../../../style/tokens.css">
  <link rel="stylesheet" href="../../../style/common.css">
  <link rel="stylesheet" href="../../../components/card/card.css">
  <style>
    body {
      padding: 40px;
      background: #1a1a2e;
      color: white;
    }

    .debug-card {
      width: 300px;
      margin: 20px 0;
      --theme-hue: 0;
      --theme-saturation: 70;
      --theme-lightness: 55;
    }

    .result {
      background: rgba(0,0,0,0.5);
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>调试卡片和icon颜色</h1>

  <!-- 测试卡片 -->
  <div class="glass-card debug-card static-glow" data-card>
    <div class="card-edge-glow"></div>
    <div class="card-glow"></div>
    <div class="glass-card-content">
      <div class="glass-card-logo glass-card-logo-center">
        <div class="mingua-icon">
          <svg viewBox="0 0 48 48">
            <text x="24" y="24" font-size="32" text-anchor="middle" dominant-baseline="central">☲</text>
          </svg>
        </div>
      </div>
      <div class="glass-card-body">
        <h3 class="profile-name">测试用户</h3>
      </div>
    </div>
  </div>

  <div class="result" id="result">
    检查中...
  </div>

  <script>
    setTimeout(() => {
      const card = document.querySelector('.debug-card');
      const result = document.getElementById('result');
      
      // 检查卡片
      const cardClasses = card.className;
      const cardStyle = card.getAttribute('style');
      
      // 检查::before
      const beforeStyle = window.getComputedStyle(card, '::before');
      const beforeBg = beforeStyle.backgroundColor;
      
      // 检查icon
      const icon = document.querySelector('.mingua-icon');
      const iconColor = window.getComputedStyle(icon).color;
      
      result.innerHTML = `
        <strong>卡片class:</strong> ${cardClasses}<br>
        <strong>卡片inline style:</strong> ${cardStyle}<br>
        <strong>::before背景色:</strong> ${beforeBg}<br>
        <strong>icon颜色:</strong> ${iconColor}<br>
        <strong>状态:</strong> ${beforeBg !== 'rgba(0, 0, 0, 0)' ? '✅ 有颜色' : '❌ 无颜色'}
      `;
    }, 100);
  </script>
</body>
</html>
