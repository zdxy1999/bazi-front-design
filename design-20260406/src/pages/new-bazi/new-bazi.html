<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建八字档案</title>

  <!-- 样式加载 -->
  <link rel="stylesheet" href="../../../style/tokens.css">
  <link rel="stylesheet" href="../../../style/common.css">
  <link rel="stylesheet" href="../../../components/background/background.css">
  <link rel="stylesheet" href="../../../components/card/card.css">
  <link rel="stylesheet" href="../../../components/button/button.css">
  <link rel="stylesheet" href="../../../components/input/input.css">
  <link rel="stylesheet" href="../../../components/selector/selector.css">
  <link rel="stylesheet" href="new-bazi.css">
</head>
<body>
  <!-- 背景容器 -->
  <div class="background-container">
    <svg class="svg-background" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      <defs>
        <!-- 木 - 绿色 -->
        <radialGradient id="Gradient1" cx="50%" cy="50%" r=".5">
          <animate attributeName="fx" dur="34s" values="0%;3%;0%" repeatCount="indefinite"></animate>
          <stop offset="0%" stop-color="#86efac" stop-opacity="1"></stop>
          <stop offset="100%" stop-color="#86efac" stop-opacity="0"></stop>
        </radialGradient>

        <!-- 火 - 红色 -->
        <radialGradient id="Gradient2" cx="50%" cy="50%" r=".5">
          <animate attributeName="fx" dur="38s" values="0%;5%;0%" repeatCount="indefinite"></animate>
          <stop offset="0%" stop-color="#f87171" stop-opacity="1"></stop>
          <stop offset="100%" stop-color="#f87171" stop-opacity="0"></stop>
        </radialGradient>

        <!-- 土 - 黄色 -->
        <radialGradient id="Gradient3" cx="50%" cy="50%" r=".5">
          <animate attributeName="fx" dur="42s" values="0%;7%;0%" repeatCount="indefinite"></animate>
          <stop offset="0%" stop-color="#fde047" stop-opacity="1"></stop>
          <stop offset="100%" stop-color="#fde047" stop-opacity="0"></stop>
        </radialGradient>

        <!-- 金 - 白色/灰色 -->
        <radialGradient id="Gradient4" cx="50%" cy="50%" r=".5">
          <animate attributeName="fx" dur="46s" values="0%;3%;0%" repeatCount="indefinite"></animate>
          <stop offset="0%" stop-color="#fafafa" stop-opacity="1"></stop>
          <stop offset="100%" stop-color="#fafafa" stop-opacity="0"></stop>
        </radialGradient>

        <!-- 水 - 蓝色 -->
        <radialGradient id="Gradient5" cx="50%" cy="50%" r=".5">
          <animate attributeName="fx" dur="50s" values="0%;5%;0%" repeatCount="indefinite"></animate>
          <stop offset="0%" stop-color="#60a5fa" stop-opacity="1"></stop>
          <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"></stop>
        </radialGradient>

        <!-- 混合渐变 -->
        <radialGradient id="Gradient6" cx="50%" cy="50%" r=".5">
          <animate attributeName="fx" dur="54s" values="0%;7%;0%" repeatCount="indefinite"></animate>
          <stop offset="0%" stop-color="#f87171" stop-opacity="0.8"></stop>
          <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"></stop>
        </radialGradient>
      </defs>

      <rect x="13.744%" y="1.18473%" width="100%" height="100%" fill="url(#Gradient1)">
        <animate attributeName="x" dur="20s" values="25%;0%;25%" repeatCount="indefinite"></animate>
        <animate attributeName="y" dur="21s" values="0%;25%;0%" repeatCount="indefinite"></animate>
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="23s" repeatCount="indefinite"></animateTransform>
      </rect>

      <rect x="82.7721%" y="38.6984%" width="100%" height="100%" fill="url(#Gradient2)">
        <animate attributeName="x" dur="22s" values="-20%;0%;-20%" repeatCount="indefinite"></animate>
        <animate attributeName="y" dur="24s" values="0%;50%;0%" repeatCount="indefinite"></animate>
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="19s" repeatCount="indefinite"></animateTransform>
      </rect>

      <rect x="54.0827%" y="66.1528%" width="100%" height="100%" fill="url(#Gradient3)">
        <animate attributeName="x" dur="25s" values="0%;50%;0%" repeatCount="indefinite"></animate>
        <animate attributeName="y" dur="23s" values="0%;20%;0%" repeatCount="indefinite"></animate>
        <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="22s" repeatCount="indefinite"></animateTransform>
      </rect>

      <rect x="22.2556%" y="40.5694%" width="100%" height="100%" fill="url(#Gradient4)">
        <animate attributeName="x" dur="21s" values="30%;0%;30%" repeatCount="indefinite"></animate>
        <animate attributeName="y" dur="22s" values="40%;0%;40%" repeatCount="indefinite"></animate>
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="25s" repeatCount="indefinite"></animateTransform>
      </rect>

      <rect x="62.7721%" y="18.6984%" width="100%" height="100%" fill="url(#Gradient5)">
        <animate attributeName="x" dur="23s" values="-10%;0%;-10%" repeatCount="indefinite"></animate>
        <animate attributeName="y" dur="26s" values="0%;30%;0%" repeatCount="indefinite"></animate>
        <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="21s" repeatCount="indefinite"></animateTransform>
      </rect>

      <rect x="35.0827%" y="78.1528%" width="100%" height="100%" fill="url(#Gradient6)">
        <animate attributeName="x" dur="24s" values="20%;0%;20%" repeatCount="indefinite"></animate>
        <animate attributeName="y" dur="28s" values="0%;60%;0%" repeatCount="indefinite"></animate>
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="24s" repeatCount="indefinite"></animateTransform>
      </rect>
    </svg>
    <div class="edge-glow">
      <div class="edge-glow-left"></div>
      <div class="edge-glow-right"></div>
    </div>
    <div class="glass-overlay"></div>
  </div>

  <!-- 主题切换按钮 -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <!-- 主内容 -->
  <main class="new-bazi-container">
    <div class="glass-card form-card" data-card>
      <div class="card-edge-glow"></div>
      <div class="card-glow"></div>
      <div class="glass-card-content">
        <div class="glass-card-header">
          <h2 class="glass-card-title">新建八字档案</h2>
        </div>
        <div class="glass-card-body">
          <form id="newBaziForm">
            <!-- 档案名称（可选） -->
            <div class="form-group">
              <label class="input-label">档案名称（可选）</label>
              <div class="input-wrapper">
                <input type="text"
                       name="profileName"
                       placeholder="留空自动生成"
                       class="text-input">
              </div>
            </div>

            <!-- 性别选择 -->
            <div class="form-group">
              <label class="input-label">性别</label>
              <div class="radio-group" data-name="gender">
                <label class="radio-button">
                  <input type="radio" name="gender" value="male" checked>
                  <span class="radio-label">男</span>
                </label>
                <label class="radio-button">
                  <input type="radio" name="gender" value="female">
                  <span class="radio-label">女</span>
                </label>
              </div>
            </div>

            <!-- 出生日期 -->
            <div class="form-group">
              <label class="input-label">出生日期</label>
              <input type="date"
                     name="birthDate"
                     value="2002-06-01"
                     class="date-input"
                     required>
            </div>

            <!-- 出生时辰 -->
            <div class="form-group">
              <label class="input-label">出生时辰</label>
              <div class="select-wrapper">
                <select name="birthHour" class="select-input" required>
                  <option value="0">子时 (23:00-01:00)</option>
                  <option value="1">丑时 (01:00-03:00)</option>
                  <option value="2">寅时 (03:00-05:00)</option>
                  <option value="3">卯时 (05:00-07:00)</option>
                  <option value="4">辰时 (07:00-09:00)</option>
                  <option value="5">巳时 (09:00-11:00)</option>
                  <option value="6">午时 (11:00-13:00)</option>
                  <option value="7">未时 (13:00-15:00)</option>
                  <option value="8">申时 (15:00-17:00)</option>
                  <option value="9">酉时 (17:00-19:00)</option>
                  <option value="10">戌时 (19:00-21:00)</option>
                  <option value="11">亥时 (21:00-23:00)</option>
                </select>
              </div>
            </div>
          </form>
        </div>
        <div class="glass-card-footer">
          <button class="btn btn-ghost" onclick="goBack()">
            返回
          </button>
          <button class="btn btn-wood" onclick="createProfile()">
            创建档案
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 脚本加载 -->
  <script src="../../../components/background/background.js"></script>
  <script src="../../../components/card/card.js"></script>
  <script src="../../../components/button/button.js"></script>
  <script src="../../../components/input/input.js"></script>
  <script src="../../../components/selector/selector.js"></script>
  <script src="new-bazi.js"></script>
</body>
</html>
