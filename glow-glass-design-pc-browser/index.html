<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八字命理 - 探索古老智慧的奥秘</title>
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/background.css">
    <link rel="stylesheet" href="./css/glass-card.css">
    <link rel="stylesheet" href="./css/buttons.css">
    <link rel="stylesheet" href="./css/theme.css">
    <link rel="stylesheet" href="./css/transitions.css">
    <style>
        /* 主页面特定样式 */
        .main-container {
            position: relative;
            z-index: 100;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 20px;
        }

        .hero p {
            font-size: clamp(1rem, 2vw, 1.25rem);
            opacity: 0.7;
            max-width: 600px;
            line-height: 1.8;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            max-width: 1200px;
            width: 100%;
            margin-bottom: 60px;
        }

        .feature-card {
            padding: 32px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .feature-card h3 {
            font-size: 1.25rem;
            margin-bottom: 12px;
        }

        .feature-card p {
            font-size: 0.95rem;
            opacity: 0.7;
            line-height: 1.6;
        }

        .feature-card svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .cta-section {
            text-align: center;
        }

        .page-content {
            transition: opacity 0.5s ease;
        }

        .page-content.hidden {
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .feature-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 主题切换按钮 -->
    <button class="theme-toggle" aria-label="切换主题">
        <svg class="theme-icon-dark" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="theme-icon-light" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <!-- 背景光晕系统 -->
    <div class="background-container">
        <div class="orbiting-glow orbiting-glow-1"></div>
        <div class="orbiting-glow orbiting-glow-2"></div>
        <div class="orbiting-glow orbiting-glow-3"></div>
        <div class="orbiting-glow orbiting-glow-4"></div>
        <div class="orbiting-glow orbiting-glow-5"></div>
        <div class="card-glow-border"></div>
        <div class="card-glow-inner"></div>
        <div class="glow-visibility-mask"></div>
        <div class="card-glow-highlight-1"></div>
        <div class="card-glow-highlight-2"></div>
        <div class="card-glow-highlight-3"></div>
        <div class="card-glow-highlight-4"></div>
        <div class="card-glow-highlight-5"></div>
    </div>

    <!-- 页面内容 -->
    <div class="main-container">
        <div class="page-content" id="pageContent">
            <!-- Hero 区域 -->
            <section class="hero">
                <h1>八字命理</h1>
                <p>探索古老智慧的奥秘，解读命运密码。通过五行生克理论，洞察人生运势。</p>
            </section>

            <!-- 功能卡片 -->
            <section class="feature-grid">
                <a href="pages/profile.html" class="glass-card feature-card card-wood">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6v6l4 2"></path>
                    </svg>
                    <h3>命卦档案</h3>
                    <p>查看您的五行生克图，了解命卦属性与运势走向</p>
                </a>

                <a href="pages/bazi-detail.html" class="glass-card feature-card card-fire">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="9" y1="21" x2="9" y2="9"></line>
                    </svg>
                    <h3>八字详情</h3>
                    <p>深入了解您的八字命盘，详尽的命理解析</p>
                </a>

                <a href="pages/bazi-analysis.html" class="glass-card feature-card card-earth">
                    <svg viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <h3>命盘分析</h3>
                    <p>多维度解读您的命盘，全面的运势分析报告</p>
                </a>

                <a href="pages/bazi-match.html" class="glass-card feature-card card-water">
                    <svg viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <h3>缘分匹配</h3>
                    <p>寻找与您命理相合的TA，测算良缘运势</p>
                </a>
            </section>

            <!-- CTA 按钮 -->
            <section class="cta-section">
                <button class="glass-button large" onclick="testTransition()">
                    <span>体验过场动画</span>
                </button>
            </section>
        </div>
    </div>

    <!-- 过渡动画层 -->
    <div class="transition-overlay" id="transitionOverlay">
        <div class="taichi-container" id="taichiContainer">
            <div class="taichi-glow"></div>
            <div class="taichi-yang">
                <svg viewBox="0 0 100 100" class="taichi-svg">
                    <path d="M 50 0 A 50 50 0 0 0 50 100 A 25 25 0 0 0 50 50 A 25 25 0 0 1 50 0" fill="#ffffff"/>
                    <circle cx="50" cy="75" r="12.5" fill="#1a1a1a"/>
                </svg>
            </div>
            <div class="taichi-yin">
                <svg viewBox="0 0 100 100" class="taichi-svg">
                    <path d="M 50 0 A 50 50 0 0 1 50 100 A 25 25 0 0 0 50 50 A 25 25 0 0 1 50 0" fill="#1a1a1a"/>
                    <circle cx="50" cy="25" r="12.5" fill="#ffffff"/>
                </svg>
            </div>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
