<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命卦档案 - 八字命理</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/background.css">
    <link rel="stylesheet" href="../css/glass-card.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/pages.css">
    <style>
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
        }
    </style>
</head>
<body>
    <!-- 返回首页链接 -->
    <a href="../index.html" class="home-link">
        <svg viewBox="0 0 24 24">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
    </a>

    <!-- 主题切换按钮 -->
    <button class="theme-toggle" aria-label="切换主题">
        <svg class="theme-icon-dark" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="theme-icon-light" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <!-- 背景光晕系统 -->
    <div class="background-container">
        <div class="orbiting-glow orbiting-glow-1"></div>
        <div class="orbiting-glow orbiting-glow-2"></div>
        <div class="orbiting-glow orbiting-glow-3"></div>
        <div class="orbiting-glow orbiting-glow-4"></div>
        <div class="orbiting-glow orbiting-glow-5"></div>
        <div class="card-glow-border"></div>
        <div class="card-glow-inner"></div>
        <div class="glow-visibility-mask"></div>
        <div class="card-glow-highlight-1"></div>
        <div class="card-glow-highlight-2"></div>
        <div class="card-glow-highlight-3"></div>
        <div class="card-glow-highlight-4"></div>
        <div class="card-glow-highlight-5"></div>
    </div>

    <!-- 页面内容 -->
    <div class="page-wrapper">
        <header class="page-header">
            <h1>命卦档案</h1>
            <p>查看您的五行生克图，了解命卦属性与运势走向</p>
        </header>

        <main class="content-area">
            <div class="profile-grid">
                <!-- 档案卡片 1 -->
                <div class="glass-card profile-card card-wood">
                    <div class="profile-header">
                        <div class="profile-avatar">甲</div>
                        <div class="profile-info">
                            <h2>甲木命卦</h2>
                            <p>阳木 · 仁者 · 生机勃勃</p>
                        </div>
                    </div>

                    <div class="wuxing-chart-container" id="chart1"></div>

                    <div class="info-grid">
                        <div class="info-item">
                            <label>日元</label>
                            <span>甲木</span>
                        </div>
                        <div class="info-item">
                            <label>命卦</label>
                            <span>巽卦</span>
                        </div>
                        <div class="info-item">
                            <label>五行</label>
                            <span>木命</span>
                        </div>
                        <div class="info-item">
                            <label>纳音</label>
                            <span>大海水</span>
                        </div>
                    </div>
                </div>

                <!-- 档案卡片 2 -->
                <div class="glass-card profile-card card-fire">
                    <div class="profile-header">
                        <div class="profile-avatar">丙</div>
                        <div class="profile-info">
                            <h2>丙火命卦</h2>
                            <p>阳火 · 礼者 · 光明磊落</p>
                        </div>
                    </div>

                    <div class="wuxing-chart-container" id="chart2"></div>

                    <div class="info-grid">
                        <div class="info-item">
                            <label>日元</label>
                            <span>丙火</span>
                        </div>
                        <div class="info-item">
                            <label>命卦</label>
                            <span>离卦</span>
                        </div>
                        <div class="info-item">
                            <label>五行</label>
                            <span>火命</span>
                        </div>
                        <div class="info-item">
                            <label>纳音</label>
                            <span>炉中火</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-buttons">
                <button class="glass-button" onclick="window.location.href='../index.html'">
                    <span>返回首页</span>
                </button>
            </div>
        </main>
    </div>

    <script type="module" src="../js/pages/profile.js"></script>
</body>
</html>
