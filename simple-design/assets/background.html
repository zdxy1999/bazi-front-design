<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简约背景</title>
    <link rel="stylesheet" href="../tokens.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, var(--theme-bg-primary) 0%, var(--theme-bg-secondary) 100%);
            transition: background 0.3s ease;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: var(--space-4);
            right: var(--space-4);
            z-index: var(--z-fixed);
            width: 48px;
            height: 48px;
            background: var(--theme-card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--theme-border);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-md);
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--theme-text-primary);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .theme-icon-light { display: none; }

        .light-theme .theme-icon-dark { display: none; }
        .light-theme .theme-icon-light { display: block; }

        /* 内容区域 */
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: var(--space-6);
            text-align: center;
        }

        .content h1 {
            font-size: var(--text-5xl);
            font-weight: var(--font-light);
            color: var(--theme-text-primary);
            margin-bottom: var(--space-4);
            letter-spacing: -0.02em;
        }

        .content p {
            font-size: var(--text-lg);
            color: var(--theme-text-secondary);
            max-width: 600px;
            line-height: var(--leading-relaxed);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg class="theme-icon-dark" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="theme-icon-light" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="content">
        <h1>简约背景</h1>
        <p>纯色渐变背景，无复杂光晕效果。简洁、优雅、高性能。</p>
    </div>

    <script>
        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('light-theme');
            localStorage.setItem('theme', html.classList.contains('light-theme') ? 'light' : 'dark');
        }

        // 加载保存的主题
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</body>
</html>
