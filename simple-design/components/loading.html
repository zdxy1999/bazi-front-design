<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载动画</title>
    <link rel="stylesheet" href="../tokens.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, var(--theme-bg-primary) 0%, var(--theme-bg-secondary) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-8);
            gap: var(--space-12);
            transition: background 0.3s ease;
        }

        .demo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-4);
        }

        .section-title {
            font-size: var(--text-lg);
            font-weight: var(--font-medium);
            color: var(--theme-text-secondary);
            margin-bottom: var(--space-4);
        }

        /* 简单的旋转加载 */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--theme-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 五色点加载 */
        .wuxing-dots {
            display: flex;
            gap: var(--space-3);
        }

        .wuxing-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .wuxing-dot:nth-child(1) {
            background: var(--color-metal);
            animation-delay: 0s;
        }

        .wuxing-dot:nth-child(2) {
            background: var(--color-wood);
            animation-delay: 0.1s;
        }

        .wuxing-dot:nth-child(3) {
            background: var(--color-water);
            animation-delay: 0.2s;
        }

        .wuxing-dot:nth-child(4) {
            background: var(--color-fire);
            animation-delay: 0.3s;
        }

        .wuxing-dot:nth-child(5) {
            background: var(--color-earth);
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.6);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 脉冲加载 */
        .pulse {
            width: 48px;
            height: 48px;
            background: var(--color-primary);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            50% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 进度条 */
        .progress-bar {
            width: 200px;
            height: 4px;
            background: var(--theme-bg-tertiary);
            border-radius: var(--radius-full);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-water), var(--color-wood));
            border-radius: var(--radius-full);
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                width: 0%;
                transform: translateX(0);
            }
            50% {
                width: 70%;
            }
            100% {
                width: 100%;
                transform: translateX(100%);
            }
        }

        /* 文字加载 */
        .text-loading {
            display: flex;
            gap: var(--space-1);
        }

        .text-loading span {
            font-size: var(--text-2xl);
            font-weight: var(--font-semibold);
            color: var(--theme-text-primary);
            animation: text-bounce 1.4s ease-in-out infinite;
        }

        .text-loading span:nth-child(1) { animation-delay: 0s; }
        .text-loading span:nth-child(2) { animation-delay: 0.1s; }
        .text-loading span:nth-child(3) { animation-delay: 0.2s; }

        @keyframes text-bounce {
            0%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: var(--space-4);
            right: var(--space-4);
            z-index: var(--z-fixed);
            width: 48px;
            height: 48px;
            background: var(--theme-card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--theme-border);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-md);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--theme-text-primary);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .theme-icon-light { display: none; }
        .light-theme .theme-icon-dark { display: none; }
        .light-theme .theme-icon-light { display: block; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg class="theme-icon-dark" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="theme-icon-light" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="demo-section">
        <div class="section-title">旋转加载</div>
        <div class="spinner"></div>
    </div>

    <div class="demo-section">
        <div class="section-title">五色点加载</div>
        <div class="wuxing-dots">
            <div class="wuxing-dot"></div>
            <div class="wuxing-dot"></div>
            <div class="wuxing-dot"></div>
            <div class="wuxing-dot"></div>
            <div class="wuxing-dot"></div>
        </div>
    </div>

    <div class="demo-section">
        <div class="section-title">脉冲加载</div>
        <div class="pulse"></div>
    </div>

    <div class="demo-section">
        <div class="section-title">进度条</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <div class="demo-section">
        <div class="section-title">文字加载</div>
        <div class="text-loading">
            <span>八</span>
            <span>字</span>
            <span>算</span>
        </div>
    </div>

    <script>
        // 主题切换
        function toggleTheme() {
            document.documentElement.classList.toggle('light-theme');
            localStorage.setItem('theme', document.documentElement.classList.contains('light-theme') ? 'light' : 'dark');
        }

        // 加载保存的主题
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</body>
</html>
