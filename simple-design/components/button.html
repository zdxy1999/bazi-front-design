<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>按钮组件</title>
    <link rel="stylesheet" href="../tokens.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, var(--theme-bg-primary) 0%, var(--theme-bg-secondary) 100%);
            padding: var(--space-8);
            transition: background 0.3s ease;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: var(--text-3xl);
            font-weight: var(--font-semibold);
            color: var(--theme-text-primary);
            margin-bottom: var(--space-8);
            text-align: center;
        }

        .section {
            margin-bottom: var(--space-12);
        }

        .section-title {
            font-size: var(--text-lg);
            font-weight: var(--font-medium);
            color: var(--theme-text-primary);
            margin-bottom: var(--space-4);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        /* 简约按钮组件 */
        .simple-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-3) var(--space-6);
            font-size: var(--text-base);
            font-weight: var(--font-medium);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            white-space: nowrap;
        }

        .simple-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .simple-btn:active {
            transform: translateY(0);
        }

        /* 按钮尺寸变体 */
        .btn-sm {
            padding: var(--space-2) var(--space-4);
            font-size: var(--text-sm);
        }

        .btn-lg {
            padding: var(--space-4) var(--space-8);
            font-size: var(--text-lg);
        }

        /* 按钮颜色变体 */
        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-wood {
            background: var(--color-wood);
            color: white;
        }

        .btn-fire {
            background: var(--color-fire);
            color: white;
        }

        .btn-earth {
            background: var(--color-earth);
            color: var(--theme-bg-primary);
        }

        .btn-metal {
            background: var(--color-metal);
            color: var(--theme-bg-primary);
            border: 1px solid var(--theme-border);
        }

        .btn-water {
            background: var(--color-water);
            color: white;
        }

        /* 幽灵按钮 */
        .btn-ghost {
            background: transparent;
            color: var(--theme-text-primary);
            border: 1px solid var(--theme-border);
        }

        .btn-ghost:hover {
            background: var(--theme-bg-tertiary);
        }

        /* 圆形按钮 */
        .btn-circle {
            width: 48px;
            height: 48px;
            padding: 0;
            border-radius: var(--radius-full);
        }

        /* 图标按钮 */
        .btn-icon {
            gap: var(--space-2);
        }

        .btn-icon svg {
            width: 20px;
            height: 20px;
        }

        /* 功能菜单按钮 */
        .menu-btn {
            width: 100%;
            padding: var(--space-6);
            background: var(--theme-card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--theme-card-border);
            border-radius: var(--radius-lg);
            color: var(--theme-text-primary);
            font-size: var(--text-lg);
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--theme-border);
        }

        .menu-btn-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xl);
            flex-shrink: 0;
        }

        .menu-btn-content {
            flex: 1;
            text-align: left;
        }

        .menu-btn-title {
            font-weight: var(--font-semibold);
            margin-bottom: var(--space-1);
        }

        .menu-btn-desc {
            font-size: var(--text-sm);
            color: var(--theme-text-tertiary);
        }

        .menu-btn-arrow {
            color: var(--theme-text-tertiary);
        }

        /* 五行颜色背景 */
        .bg-wood { background: var(--color-wood); color: white; }
        .bg-fire { background: var(--color-fire); color: white; }
        .bg-earth { background: var(--color-earth); color: var(--theme-bg-primary); }
        .bg-metal { background: var(--color-metal); color: var(--theme-text-primary); }
        .bg-water { background: var(--color-water); color: white; }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: var(--space-4);
            right: var(--space-4);
            z-index: var(--z-fixed);
            width: 48px;
            height: 48px;
            background: var(--theme-card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--theme-border);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-md);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--theme-text-primary);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .theme-icon-light { display: none; }
        .light-theme .theme-icon-dark { display: none; }
        .light-theme .theme-icon-light { display: block; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg class="theme-icon-dark" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="theme-icon-light" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="container">
        <h1>简约按钮组件</h1>

        <!-- 基础按钮 -->
        <div class="section">
            <h2 class="section-title">基础按钮</h2>
            <div class="button-group">
                <button class="simple-btn btn-primary">主按钮</button>
                <button class="simple-btn btn-wood">木</button>
                <button class="simple-btn btn-fire">火</button>
                <button class="simple-btn btn-earth">土</button>
                <button class="simple-btn btn-metal">金</button>
                <button class="simple-btn btn-water">水</button>
            </div>
        </div>

        <!-- 按钮尺寸 -->
        <div class="section">
            <h2 class="section-title">按钮尺寸</h2>
            <div class="button-group">
                <button class="simple-btn btn-primary btn-sm">小按钮</button>
                <button class="simple-btn btn-primary">默认按钮</button>
                <button class="simple-btn btn-primary btn-lg">大按钮</button>
            </div>
        </div>

        <!-- 幽灵按钮 -->
        <div class="section">
            <h2 class="section-title">幽灵按钮</h2>
            <div class="button-group">
                <button class="simple-btn btn-ghost">默认</button>
                <button class="simple-btn btn-ghost btn-wood">木</button>
                <button class="simple-btn btn-ghost btn-fire">火</button>
                <button class="simple-btn btn-ghost btn-earth">土</button>
                <button class="simple-btn btn-ghost btn-metal">金</button>
                <button class="simple-btn btn-ghost btn-water">水</button>
            </div>
        </div>

        <!-- 圆形按钮 -->
        <div class="section">
            <h2 class="section-title">圆形按钮</h2>
            <div class="button-group">
                <button class="simple-btn btn-circle btn-primary">+</button>
                <button class="simple-btn btn-circle btn-wood">木</button>
                <button class="simple-btn btn-circle btn-fire">火</button>
                <button class="simple-btn btn-circle btn-earth">土</button>
                <button class="simple-btn btn-circle btn-metal">金</button>
                <button class="simple-btn btn-circle btn-water">水</button>
            </div>
        </div>

        <!-- 功能菜单按钮 -->
        <div class="section">
            <h2 class="section-title">功能菜单按钮</h2>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-4);">
                <button class="menu-btn">
                    <div class="menu-btn-icon bg-wood">八字</div>
                    <div class="menu-btn-content">
                        <div class="menu-btn-title">八字详情</div>
                        <div class="menu-btn-desc">查看详细八字信息</div>
                    </div>
                    <div class="menu-btn-arrow">→</div>
                </button>

                <button class="menu-btn">
                    <div class="menu-btn-icon bg-fire">分析</div>
                    <div class="menu-btn-content">
                        <div class="menu-btn-title">命盘分析</div>
                        <div class="menu-btn-desc">五行生克分析</div>
                    </div>
                    <div class="menu-btn-arrow">→</div>
                </button>

                <button class="menu-btn">
                    <div class="menu-btn-icon bg-water">匹配</div>
                    <div class="menu-btn-content">
                        <div class="menu-btn-title">缘分匹配</div>
                        <div class="menu-btn-desc">查找相合八字</div>
                    </div>
                    <div class="menu-btn-arrow">→</div>
                </button>

                <button class="menu-btn">
                    <div class="menu-btn-icon bg-earth">设置</div>
                    <div class="menu-btn-content">
                        <div class="menu-btn-title">档案设置</div>
                        <div class="menu-btn-desc">管理个人档案</div>
                    </div>
                    <div class="menu-btn-arrow">→</div>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('light-theme');
            localStorage.setItem('theme', html.classList.contains('light-theme') ? 'light' : 'dark');
        }

        // 加载保存的主题
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</body>
</html>
