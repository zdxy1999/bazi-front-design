<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五行算命 - 八字命盘</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 主题切换按钮 -->
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <!-- 背景光晕效果 -->
    <div class="background">
        <div class="halo halo-1"></div>
        <div class="halo halo-2"></div>
        <div class="halo halo-3"></div>
        <div class="halo halo-4"></div>
        <div class="halo halo-5"></div>
    </div>

    <!-- 主内容区域 -->
    <main class="main-container">
        <!-- 左侧：五行生克图 -->
        <section class="left-panel">
            <div class="glass-card wuxing-card">
                <h2 class="card-title">五行生克图</h2>
                <div class="wuxing-diagram">
                    <!-- 五行圆形布局 -->
                    <div class="wuxing-circle">
                        <div class="element element-metal" data-element="metal">
                            <div class="element-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="9"/>
                                    <path d="M12 3v18M3 12h18"/>
                                </svg>
                            </div>
                            <span class="element-name">金</span>
                        </div>
                        <div class="element element-water" data-element="water">
                            <div class="element-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                                </svg>
                            </div>
                            <span class="element-name">水</span>
                        </div>
                        <div class="element element-wood" data-element="wood">
                            <div class="element-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2L12 22M8 18L12 22L16 18M8 6L12 2L16 6"/>
                                    <path d="M6 12h3M15 12h3"/>
                                </svg>
                            </div>
                            <span class="element-name">木</span>
                        </div>
                        <div class="element element-fire" data-element="fire">
                            <div class="element-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
                                </svg>
                            </div>
                            <span class="element-name">火</span>
                        </div>
                        <div class="element element-earth" data-element="earth">
                            <div class="element-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                                    <line x1="3" y1="9" x2="21" y2="9"/>
                                    <line x1="3" y1="15" x2="21" y2="15"/>
                                    <line x1="9" y1="3" x2="9" y2="21"/>
                                    <line x1="15" y1="3" x2="15" y2="21"/>
                                </svg>
                            </div>
                            <span class="element-name">土</span>
                        </div>

                        <!-- 相生关系箭头 -->
                        <svg class="arrows sheng-arrows" viewBox="0 0 200 200">
                            <defs>
                                <marker id="arrowhead-sheng" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
                                    <polygon points="0 0, 10 3, 0 6" fill="currentColor"/>
                                </marker>
                            </defs>
                            <!-- 金生水 -->
                            <path d="M100,30 Q120,50 100,70" fill="none" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead-sheng)" class="sheng-arrow"/>
                            <!-- 水生木 -->
                            <path d="M100,70 Q120,90 100,110" fill="none" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead-sheng)" class="sheng-arrow"/>
                            <!-- 木生火 -->
                            <path d="M100,110 Q120,130 100,150" fill="none" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead-sheng)" class="sheng-arrow"/>
                            <!-- 火生土 -->
                            <path d="M100,150 Q80,170 100,190" fill="none" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead-sheng)" class="sheng-arrow"/>
                            <!-- 土生金 -->
                            <path d="M100,190 Q80,210 100,230" fill="none" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead-sheng)" class="sheng-arrow"/>
                        </svg>
                    </div>

                    <!-- 相生相克说明 -->
                    <div class="wuxing-legend">
                        <div class="legend-item">
                            <span class="legend-line sheng-line"></span>
                            <span>相生（生生不息）</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-line ke-line"></span>
                            <span>相克（制约平衡）</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 右侧：个人五行八字档案 -->
        <section class="right-panel">
            <div class="glass-card profile-card">
                <h2 class="card-title">个人五行八字档案</h2>

                <!-- 基本信息卡片 -->
                <div class="info-section">
                    <div class="info-row">
                        <span class="info-label">姓名</span>
                        <span class="info-value">张三</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">出生时间</span>
                        <span class="info-value">1990年3月15日 10:30</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">性别</span>
                        <span class="info-value">男</span>
                    </div>
                </div>

                <!-- 八字四柱 -->
                <div class="bazi-section">
                    <h3 class="section-title">八字四柱</h3>
                    <div class="bazi-pillars">
                        <div class="pillar">
                            <div class="pillar-header">年柱</div>
                            <div class="pillar-content">
                                <span class="gan">庚</span>
                                <span class="zhi">午</span>
                            </div>
                        </div>
                        <div class="pillar">
                            <div class="pillar-header">月柱</div>
                            <div class="pillar-content">
                                <span class="gan">己</span>
                                <span class="zhi">卯</span>
                            </div>
                        </div>
                        <div class="pillar">
                            <div class="pillar-header">日柱</div>
                            <div class="pillar-content">
                                <span class="gan">甲</span>
                                <span class="zhi">申</span>
                            </div>
                        </div>
                        <div class="pillar">
                            <div class="pillar-header">时柱</div>
                            <div class="pillar-content">
                                <span class="gan">己</span>
                                <span class="zhi">巳</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 五行分析 -->
                <div class="wuxing-analysis">
                    <h3 class="section-title">五行分析</h3>
                    <div class="wuxing-bars">
                        <div class="wuxing-bar">
                            <div class="bar-label">
                                <span class="wuxing-tag metal">金</span>
                            </div>
                            <div class="bar-track">
                                <div class="bar-fill metal-fill" style="width: 30%"></div>
                            </div>
                            <div class="bar-value">30%</div>
                        </div>
                        <div class="wuxing-bar">
                            <div class="bar-label">
                                <span class="wuxing-tag wood">木</span>
                            </div>
                            <div class="bar-track">
                                <div class="bar-fill wood-fill" style="width: 25%"></div>
                            </div>
                            <div class="bar-value">25%</div>
                        </div>
                        <div class="wuxing-bar">
                            <div class="bar-label">
                                <span class="wuxing-tag water">水</span>
                            </div>
                            <div class="bar-track">
                                <div class="bar-fill water-fill" style="width: 15%"></div>
                            </div>
                            <div class="bar-value">15%</div>
                        </div>
                        <div class="wuxing-bar">
                            <div class="bar-label">
                                <span class="wuxing-tag fire">火</span>
                            </div>
                            <div class="bar-track">
                                <div class="bar-fill fire-fill" style="width: 10%"></div>
                            </div>
                            <div class="bar-value">10%</div>
                        </div>
                        <div class="wuxing-bar">
                            <div class="bar-label">
                                <span class="wuxing-tag earth">土</span>
                            </div>
                            <div class="bar-track">
                                <div class="bar-fill earth-fill" style="width: 20%"></div>
                            </div>
                            <div class="bar-value">20%</div>
                        </div>
                    </div>

                    <!-- 五行强弱判断 -->
                    <div class="strength-analysis">
                        <div class="strength-item">
                            <span class="strength-label">日主</span>
                            <span class="strength-value">甲木</span>
                        </div>
                        <div class="strength-item">
                            <span class="strength-label">强弱</span>
                            <span class="strength-tag weak">身弱</span>
                        </div>
                        <div class="strength-item">
                            <span class="strength-label">喜用</span>
                            <div class="strength-tags">
                                <span class="strength-tag favorable">水</span>
                                <span class="strength-tag favorable">木</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
